name: 추천 종목 자동 생성

on:
  schedule:
    # KST 06:00~07:55 (UTC 21:00~22:55) 동안 5분마다 실행
    - cron: '*/5 21-22 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 추천 생성 엔드포인트 호출
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            --max-time 58 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/recommendations/generate")

          echo "HTTP 상태: $HTTP_STATUS"
          jq -r '
            "누적 처리: \(.totalDone // "?")종목  소요: \(.elapsed // "?")",
            "완료 여부: \(if .isComplete then "완료" else "미완 — 다음 실행에서 계속" end)",
            (.log // [] | .[-5:] | .[])
          ' /tmp/response.txt 2>/dev/null || cat /tmp/response.txt
