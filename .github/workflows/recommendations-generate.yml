name: 추천 종목 자동 생성

on:
  schedule:
    # KST 06:00~07:55 (UTC 21:00~22:55) 동안 5분마다 실행
    - cron: '*/5 21-22 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 추천 생성 엔드포인트 호출
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            --max-time 58 \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$APP_URL/api/recommendations/generate")

          RESPONSE=$(cat /tmp/response.txt)
          echo "HTTP 상태: $HTTP_STATUS"
          echo "응답: $RESPONSE"

          python3 - <<'PYEOF'
import json, os

with open('/tmp/response.txt') as f:
    raw = f.read()

try:
    d = json.loads(raw)
    print(f'누적 처리: {d.get("totalDone", "?")}종목  소요: {d.get("elapsed", "?")}')
    print(f'완료 여부: {"완료" if d.get("isComplete") else "미완 — 다음 실행에서 계속"}')
    for line in d.get('log', [])[-5:]:
        print(line)
except Exception as e:
    print(f'JSON 파싱 실패 ({e}) — 원시 응답:')
    print(raw[:1000])
PYEOF
