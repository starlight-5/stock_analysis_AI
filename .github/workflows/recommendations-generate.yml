name: 추천 종목 자동 생성

on:
  schedule:
    # KST 06:00~07:55 (UTC 21:00~22:55) 동안 20분마다 실행 — GitHub은 고빈도(5분) 스케줄을
    # 부하 상황에서 자주 건너뛰므로, 저빈도로 깨운 뒤 잡 내부에서 반복 호출한다.
    - cron: '*/20 21-22 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 추천 생성 엔드포인트 반복 호출 (최대 18분, 60초 간격)
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          END=$((SECONDS + 18 * 60))
          while [ $SECONDS -lt $END ]; do
            HTTP_STATUS=$(curl -s -L -o /tmp/response.txt -w "%{http_code}" \
              --max-time 58 \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$APP_URL/api/recommendations/generate")

            echo "[$(date -u +%H:%M:%S)] HTTP 상태: $HTTP_STATUS"
            jq -r '
              "누적 처리: \(.totalDone // "?")종목  소요: \(.elapsed // "?")",
              "완료 여부: \(if .isComplete then "완료" else "미완 — 계속 반복" end)",
              (.log // [] | .[-3:] | .[])
            ' /tmp/response.txt 2>/dev/null || cat /tmp/response.txt

            IS_COMPLETE=$(jq -r '.isComplete // false' /tmp/response.txt 2>/dev/null)
            if [ "$IS_COMPLETE" = "true" ]; then
              echo "오늘자 추천 생성 완료 — 반복 종료"
              break
            fi

            sleep 60
          done
